name: CI

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - "*.md"
      - "skills/*.md"
      - "tests/*.md"
      - "docs/**"
  pull_request:
    branches: [main]
    paths-ignore:
      - "*.md"
      - "skills/*.md"
      - "tests/*.md"
      - "docs/**"

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install ruff
      - name: Lint
        run: ruff check .
      - name: Format check
        run: ruff format --check .

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
      - name: Run tests
        run: pytest tools/ -v
      - name: Validate project structure
        run: python tools/validate_project.py
      - name: Run scenario checks (dry)
        run: python tools/run_test_scenarios.py
      - name: Orchestrate smoke test
        run: python -m scripts.orchestrate --query "Design a water-puppetry scenario for Le Loi" --log-level ERROR || true
